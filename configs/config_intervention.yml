# Intervention Configuration for concept noise experiments
dataset: "mnist"
model: "PGCM"

# Training Hyperparameters
epochs: 100
batch_size: 128
num_workers: 0
lr: 0.001
warmup_epochs: 10
fixed_lr: False

# Model and Concept Embeddings
protosize: 64
embedding_size: 128
nb_proto: null # None allows default dataset logic to decide

# Loss Function Weights
lam_entropy: 0.03
lam_batch_entropy: 0.0
decay_lam_entropy: True
lam_reconstruction: 5.0
lam_kl: 0.001
lam_segmentation: 1.0
lam_orth: 0.0
lam_proto_emb: 0.0

# Settings
segmentation_method: "mask"
plot_frequency: 10
concepts_to_task: "thresholding"
use_weights: False
always_use_true_masks: False
use_initial_proto_embs: False
use_balanced_accuracy: True
use_linear_task_predictor: False

# Autoencoder Settings
use_pretrained_autoencoder: False
autoencoder_path: null

# Segmenter Settings
use_pretrained_segmenter: False
presegmented_datasets_path: null

# Interventions / Noise (These highlight the specific use case)
intv_prob: 0.20
noisy_prob: 0.30

# Example: NOISE ON MNIST (Injecting noisy digits instead of true source)
noisy_digit: [3, 1]
noisy_target_digit: [4, 8]

# Example: NOISE ON CELEBAMASK 
noisy_part: null
noisy_target_part: null
