# Competitor configurations on CelebA-Mask (CBM, CRM, CMR, DNN)
dataset: "celebamask"

# Select the model directly in the command line or change it here
model: "CRM"  

# Base training hyperparams
epochs: 200
batch_size: 128
num_workers: 0
lr: 0.001
warmup_epochs: 10

# Embedding defaults
embedding_size: 128
rule_emb_size: 500  # For CMR only

# Settings
concepts_to_task: "thresholding"
use_weights: True
plot_frequency: 10
intv_prob: 0.20
use_balanced_accuracy: True
use_linear_task_predictor: False
